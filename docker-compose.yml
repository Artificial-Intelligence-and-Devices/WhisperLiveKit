version: '3.8'

services:
  whisper-server:
    build:
      context: .
      dockerfile: Dockerfile
    image: kampkelly/whisper-streaming-server
    ports:
      - "8001:8001"
    env_file:
      - .env
    command: [
      "python", "whisper_fastapi_online_server.py",
      "--host", "0.0.0.0",
      "--port", "8001",
    ]
